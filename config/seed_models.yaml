# Seed Model List — Curated major HuggingFace models
#
# These are well-known, official models already on HuggingFace, organized by
# category.  The monitor pre-loads them into the ModelStore on first run so
# they appear as "known" baseline entries rather than triggering false
# new-model alerts.
#
# Rules:
#   - Only official / first-party repositories (no community quants/LoRA)
#   - HF repo IDs must be exact (org/model-name)
#   - Categories are for dashboard display grouping only
#
# To add a model: append it under the appropriate category with its HF repo ID.
# The monitor will fetch full metadata from the HF API on the next run.

categories:

